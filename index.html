<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Younghwa Hairstyle Gallery | 영화 헤어스타일 갤러리</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <!-- 왼쪽 1/4: 로고 섹션 -->
            <div class="logo-section">
                <div class="logo-container">
                    <img src="assets/logo/logo.png" alt="Younghwagwan Logo" class="main-logo">
                </div>
                <p class="tagline">나만의 특별한 스타일을 찾아가는 곳</p>
            </div>

            <!-- 오른쪽 3/4: 내비게이션 섹션 -->
            <div class="nav-section">
                <div class="nav-top-bar">
                    <nav class="category-nav">
                        <div class="nav-item">
                            <button class="nav-btn active" data-category="all">All</button>
                        </div>
                        <div class="nav-item has-submenu">
                            <button class="nav-btn" data-category="women">Women Style</button>
                            <div class="submenu">
                                <button class="sub-nav-btn" data-category="women-long">긴머리</button>
                                <button class="sub-nav-btn" data-category="women-bob">단발</button>
                                <button class="sub-nav-btn" data-category="women-short">숏컷</button>
                                <button class="sub-nav-btn" data-category="women-perm">펌스타일</button>
                                <button class="sub-nav-btn" data-category="women-color">컬러</button>
                            </div>
                        </div>
                        <div class="nav-item has-submenu">
                            <button class="nav-btn" data-category="men">Men's Style</button>
                            <div class="submenu">
                                <button class="sub-nav-btn" data-category="men-short">숏기장</button>
                                <button class="sub-nav-btn" data-category="men-medium">미디움기장</button>
                                <button class="sub-nav-btn" data-category="men-long">롱기장</button>
                                <button class="sub-nav-btn" data-category="men-perm">펌스타일</button>
                                <button class="sub-nav-btn" data-category="men-color">컬러</button>
                            </div>
                        </div>
                        <div class="nav-item">
                            <a href="contact.html" class="nav-btn" id="contact-link">Contact</a>
                        </div>
                    </nav>
                    <a href="https://www.instagram.com/0_a_hair/?hl=ko" target="_blank" class="instagram-link" title="Instagram 바로가기">
                        <i class="fab fa-instagram"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <!-- Floating Chat Widget -->
    <div class="chat-widget" id="chat-widget">
        <div class="chat-window" id="chat-window">
            <div class="chat-header">
                <h3>Style Consultant</h3>
                <button class="close-chat" id="close-chat">&times;</button>
            </div>
            <div class="chat-body" id="chat-body">
                <div class="message bot">
                    안녕하세요! 영화 헤어스타일 갤러리입니다. <br>어떤 스타일이 궁금하신가요?
                </div>
            </div>
            <div class="chat-footer">
                <input type="text" placeholder="메시지를 입력하세요..." id="chat-input">
                <button id="send-chat"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button class="chat-toggle-btn" id="chat-toggle-btn">
            <i class="fas fa-comment-dots"></i>
        </button>
    </div>

    <main class="gallery-wrapper">
        <div id="gallery-container" class="gallery-grid">
            <!-- JavaScript가 여기에 카드를 생성합니다. -->
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Younghwagwan. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
