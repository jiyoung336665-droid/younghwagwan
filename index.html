

<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Younghwa Hairstyle Gallery | 영화 헤어스타일 갤러리</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <a href="https://www.instagram.com/0_a_hair/?hl=ko" target="_blank" class="instagram-link" title="Instagram 바로가기">
            <i class="fab fa-instagram"></i>
        </a>
        <div class="header-content">
            <div class="logo-container">
                <img src="assets/logo/logo.png" alt="Younghwagwan Logo" class="main-logo">
            </div>
            <p class="tagline">당신의 스타일을 완성하는 공간</p>
        </div>
        <nav class="category-nav">
            <div class="nav-item">
                <button class="nav-btn active" data-category="all">All</button>
            </div>
            <div class="nav-item has-submenu">
                <button class="nav-btn" data-category="women">Women Style</button>
                <div class="submenu">
                    <button class="sub-nav-btn" data-category="women-long">긴머리</button>
                    <button class="sub-nav-btn" data-category="women-bob">단발</button>
                    <button class="sub-nav-btn" data-category="women-short">숏컷</button>
                    <button class="sub-nav-btn" data-category="women-perm">펌스타일</button>
                    <button class="sub-nav-btn" data-category="women-color">컬러</button>
                </div>
            </div>
            <div class="nav-item has-submenu">
                <button class="nav-btn" data-category="men">Men's Style</button>
                <div class="submenu">
                    <button class="sub-nav-btn" data-category="men-short">숏기장</button>
                    <button class="sub-nav-btn" data-category="men-medium">미디움기장</button>
                    <button class="sub-nav-btn" data-category="men-long">롱기장</button>
                    <button class="sub-nav-btn" data-category="men-perm">펌스타일</button>
                    <button class="sub-nav-btn" data-category="men-color">컬러</button>
                </div>
            </div>
        </nav>
    </header>

    <main class="gallery-wrapper">
        <div id="gallery-container" class="gallery-grid">
            <!-- JavaScript가 여기에 카드를 생성합니다. -->
        </div>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Younghwagwan. All rights reserved.</p>
    </footer>

    <script src="main.js"></script>
</body>
</html>
