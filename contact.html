
<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact | Younghwagwan Hairstyle Gallery</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;700&family=Playfair+Display:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
</head>
<body>
    <header class="main-header">
        <div class="header-container">
            <div class="logo-section">
                <a href="index.html" style="text-decoration: none;">
                    <div class="logo-container">
                        <img src="assets/logo/logo.png" alt="Younghwagwan Logo" class="main-logo">
                    </div>
                </a>
                <p class="tagline">나만의 특별한 스타일을 찾아가는 곳</p>
            </div>

            <div class="nav-section">
                <div class="nav-top-bar">
                    <nav class="category-nav">
                        <div class="nav-item">
                            <a href="index.html" class="nav-btn">All</a>
                        </div>
                        <div class="nav-item has-submenu">
                            <a href="index.html" class="nav-btn">Women Style</a>
                        </div>
                        <div class="nav-item has-submenu">
                            <a href="index.html" class="nav-btn">Men's Style</a>
                        </div>
                        <div class="nav-item">
                            <a href="contact.html" class="nav-btn active">Contact</a>
                        </div>
                    </nav>
                    <a href="https://www.instagram.com/0_a_hair/?hl=ko" target="_blank" class="instagram-link" title="Instagram 바로가기">
                        <i class="fab fa-instagram"></i>
                    </a>
                    <a href="https://naver.me/FDnCdvaZ" target="_blank" class="blog-link" title="Naver Blog 바로가기">
                        <i class="fas fa-blog"></i>
                    </a>
                </div>
            </div>
        </div>
    </header>

    <main class="contact-wrapper">
        <section class="contact-header">
            <h2 class="section-title">Visit Us</h2>
            <p class="section-subtitle">당신의 아름다움이 시작되는 공간</p>
        </section>

        <section class="map-section">
            <!-- Naver Map Iframe (Using the specific location) -->
            <div class="map-container">
                <iframe src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d3163.486221762106!2d126.9104597763661!3d37.54358802540702!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x357c98d69786a59b%3A0xc3f8e5832a76f6df!2z7ISc7Jq47Yq567OE7IucIOu 마7Y-s6rWsIO2GoOydleyroCAxNy05!5e0!3m2!1sko!2skr!4v1711280000000!5m2!1sko!2skr" 
                width="100%" height="450" style="border:0;" allowfullscreen="" loading="lazy" referrerpolicy="no-referrer-when-downgrade"></iframe>
            </div>
        </section>

        <section class="info-section">
            <div class="address-box">
                <i class="fas fa-map-marker-alt"></i>
                <p>서울 마포구 토정로 17-9 HOMELEY</p>
            </div>

            <div class="action-links">
                <!-- 네이버 예약 링크 -->
                <a href="https://map.naver.com/p/entry/place/1637760650?lng=126.9130347&lat=37.5461493&placePath=%2Fhome%3FbookingRedirectUrl%3Dhttps%253A%252F%252Fm.booking.naver.com%252Fbooking%252F13%252Fbizes%252F709744%252Fitems%252F7241119%253Ftheme%253Dplace%2526tab%253Ddetails%2526lang%253Dko%26forceRedirect%3Dtrue&entry=plt&searchType=place&area=plt&c=15.00,0,0,0,dh" 
                   target="_blank" class="action-btn naver" title="네이버 예약">
                    <i class="far fa-calendar-check"></i>
                    <span>네이버 예약</span>
                </a>
                
                <!-- 인스타그램 링크 -->
                <a href="https://www.instagram.com/0_a_hair/?hl=ko" target="_blank" class="action-btn insta" title="인스타그램">
                    <i class="fab fa-instagram"></i>
                    <span>Instagram</span>
                </a>

                <!-- 네이버 블로그 링크 -->
                <a href="https://naver.me/FDnCdvaZ" target="_blank" class="action-btn blog" title="네이버 블로그">
                    <i class="fas fa-blog"></i>
                    <span>Blog</span>
                </a>
            </div>
        </section>
    </main>

    <footer class="main-footer">
        <p>&copy; 2026 Younghwagwan. All rights reserved.</p>
    </footer>

    <!-- Floating Chat Widget -->
    <div class="chat-widget" id="chat-widget">
        <div class="chat-window" id="chat-window">
            <div class="chat-header">
                <button class="close-chat" id="close-chat">&times;</button>
            </div>
            <div class="chat-body" id="chat-body">
                <div class="message bot">
                    안녕하세요.<br>나만의 특별함을 찾아가는 곳,<br>영화관 헤어 스튜디오입니다.
                </div>
                <div class="chat-options">
                    <button class="opt-btn" data-action="price">가격문의</button>
                    <button class="opt-btn" data-action="location">위치확인</button>
                    <button class="opt-btn" data-action="contact">직접연락하기</button>
                </div>
            </div>
            <div class="chat-footer">
                <input type="text" placeholder="메시지를 입력하세요..." id="chat-input">
                <button id="send-chat"><i class="fas fa-paper-plane"></i></button>
            </div>
        </div>
        <button class="chat-toggle-btn" id="chat-toggle-btn">
            <i class="fas fa-comment-dots"></i>
        </button>
    </div>

    <script src="main.js"></script>
</body>
</html>
